<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KasirKu Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#141008;color:#f0e8d8;font-family:sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.hdr{background:#1e1710;padding:10px;text-align:center;font-weight:bold;border-bottom:1px solid #3a3020}
.content{flex:1;display:flex;align-items:center;justify-content:center;color:#8a7a60}
/* INI BAGIAN PENTING */
.bottom-nav{display:flex;background:#1e1710;border-top:1px solid #3a3020;padding:8px 0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;color:#8a7a60;cursor:pointer;font-size:10px;border:none;background:none;padding:5px}
.nav-item .ni{font-size:20px}
.nav-item.active{color:#f5a623}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">🏪 KasirKu v6.2</div>
  <div class="content">⬆️ Produk muncul di sini<br>⬇️ Navigasi di bawah</div>
  
  <!-- BOTTOM NAVIGATION -->
  <div class="bottom-nav">
    <button class="nav-item active"><span class="ni">🛒</span>Kasir</button>
    <button class="nav-item"><span class="ni">📦</span>Produk</button>
    <button class="nav-item"><span class="ni">👑</span>Member</button>
    <button class="nav-item"><span class="ni">📋</span>Riwayat</button>
    <button class="nav-item"><span class="ni">⋯</span>Lainnya</button>
  </div>
</div>
</body>
</html>
